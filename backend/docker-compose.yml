x-backend: &backend
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: dragonscope
      POSTGRES_PASSWORD: dragonscope
      POSTGRES_DB: dragonscope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-timescaledb.sql:/docker-entrypoint-initdb.d/init-timescaledb.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dragonscope"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    <<: *backend
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "3456:3456"

  worker:
    <<: *backend
    build:
      context: .
      dockerfile: Dockerfile
      target: worker

  beat:
    <<: *backend
    build:
      context: .
      dockerfile: Dockerfile
      target: beat

volumes:
  pgdata:
  redisdata:
