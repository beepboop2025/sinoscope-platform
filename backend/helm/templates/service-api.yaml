apiVersion: v1
kind: Service
metadata:
  name: {{ include "dragonscope.fullname" . }}-api
  labels:
    app.kubernetes.io/name: {{ include "dragonscope.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "dragonscope.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
