name: Frontend CI

on:
  push:
    branches: [main, enterprise-monorepo]
    paths-ignore: ['backend/**', '*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['backend/**', '*.md']

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
        continue-on-error: true  # Pre-existing type issues being addressed incrementally

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:run
      - run: npm run test:coverage
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Check bundle size
        run: |
          TOTAL=$(du -sk dist/ | cut -f1)
          echo "Total bundle size: ${TOTAL}KB"
          if [ "$TOTAL" -gt 5120 ]; then
            echo "::warning::Bundle size ${TOTAL}KB exceeds 5MB target"
          fi
