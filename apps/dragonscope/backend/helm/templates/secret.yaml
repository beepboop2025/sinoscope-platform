apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dragonscope.fullname" . }}-secret
  labels:
    app.kubernetes.io/name: {{ include "dragonscope.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  CLERK_SECRET_KEY: {{ .Values.secrets.clerkSecretKey | default "" | b64enc | quote }}
  ALPHA_VANTAGE_API_KEY: {{ .Values.secrets.alphaVantageApiKey | default "" | b64enc | quote }}
  FINNHUB_API_KEY: {{ .Values.secrets.finnhubApiKey | default "" | b64enc | quote }}
  NEWSDATA_API_KEY: {{ .Values.secrets.newsdataApiKey | default "" | b64enc | quote }}
  NEWSAPI_API_KEY: {{ .Values.secrets.newsapiApiKey | default "" | b64enc | quote }}
  COINGECKO_API_KEY: {{ .Values.secrets.coingeckoApiKey | default "" | b64enc | quote }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | default "" | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | default "dragonscope" | b64enc | quote }}
