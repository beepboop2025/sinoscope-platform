global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "dragonscope-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:3456"]
        labels:
          service: "dragonscope-api"

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "node-exporter"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
