# DragonScope Enterprise - Prometheus Alerting Rules
# Production alerting rules for critical and warning conditions

groups:
  # ============================================================================
  # SYSTEM ALERTS
  # ============================================================================
  - name: system
    interval: 30s
    rules:
      # High CPU Usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% (current value: {{ $value }}%)"

      - alert: CriticalCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Critical CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 95% (current value: {{ $value }}%)"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% (current value: {{ $value }}%)"

      - alert: CriticalMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 95
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Critical memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 95% (current value: {{ $value }}%)"

      # Disk Space
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) < 15
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space is below 15% available (current: {{ $value }}%)"

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) < 5
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}"
          description: "Disk space is below 5% available (current: {{ $value }}%)"

      # Node Down
      - alert: NodeDown
        expr: up{job="node-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Node {{ $labels.instance }} is down"
          description: "Node exporter has been down for more than 1 minute"

  # ============================================================================
  # APPLICATION ALERTS
  # ============================================================================
  - name: dragonscope-application
    interval: 15s
    rules:
      # API Health
      - alert: APIHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="dragonscope-api",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="dragonscope-api"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          team: engineering
        annotations:
          summary: "High error rate on DragonScope API"
          description: "Error rate is above 5% (current: {{ $value | humanizePercentage }})"

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="dragonscope-api"}[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
          team: engineering
        annotations:
          summary: "High latency on DragonScope API"
          description: "95th percentile latency is above 2s (current: {{ $value }}s)"

      - alert: APIDown
        expr: up{job="dragonscope-api"} == 0
        for: 2m
        labels:
          severity: critical
          team: engineering
        annotations:
          summary: "DragonScope API is down"
          description: "API has been down for more than 2 minutes"

      # Service Unavailable
      - alert: ServiceUnavailable
        expr: up{job=~"dragonscope-.*"} == 0
        for: 5m
        labels:
          severity: warning
          team: engineering
        annotations:
          summary: "Service {{ $labels.job }} is unavailable"
          description: "Service has been down for more than 5 minutes"

      # High Request Rate
      - alert: APIHighRequestRate
        expr: sum(rate(http_requests_total{job="dragonscope-api"}[5m])) > 10000
        for: 5m
        labels:
          severity: info
          team: engineering
        annotations:
          summary: "High request rate on API"
          description: "Request rate is above 10k req/s (current: {{ $value }})"

  # ============================================================================
  # DATABASE ALERTS
  # ============================================================================
  - name: database
    interval: 30s
    rules:
      # TimescaleDB Alerts
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          team: dba
        annotations:
          summary: "PostgreSQL instance {{ $labels.instance }} is down"
          description: "PostgreSQL has been down for more than 1 minute"

      - alert: PostgresConnectionsHigh
        expr: |
          (
            pg_stat_activity_count{datname!=""} / pg_settings_max_connections
          ) > 0.8
        for: 5m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "PostgreSQL connections high"
          description: "Connection usage is above 80% (current: {{ $value | humanizePercentage }})"

      - alert: PostgresReplicationLag
        expr: pg_replication_lag > 30
        for: 5m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "PostgreSQL replication lag high"
          description: "Replication lag is above 30 seconds (current: {{ $value }}s)"

      - alert: PostgresSlowQueries
        expr: |
          pg_stat_activity_max_tx_duration{datname!=""} > 300
        for: 5m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "Queries running for more than 5 minutes detected"

      # Redis Alerts
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          team: dba
        annotations:
          summary: "Redis instance {{ $labels.instance }} is down"
          description: "Redis has been down for more than 1 minute"

      - alert: RedisMemoryHigh
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: critical
          team: dba
        annotations:
          summary: "Redis memory usage critical"
          description: "Memory usage is above 90% (current: {{ $value | humanizePercentage }})"

      - alert: RedisConnectionsHigh
        expr: redis_connected_clients / redis_config_maxclients > 0.8
        for: 5m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "Redis connections high"
          description: "Connection usage is above 80% (current: {{ $value | humanizePercentage }})"

      - alert: RedisReplicationBroken
        expr: redis_master_link_up == 0
        for: 1m
        labels:
          severity: critical
          team: dba
        annotations:
          summary: "Redis replication broken"
          description: "Redis master link is down"

  # ============================================================================
  # KAFKA ALERTS
  # ============================================================================
  - name: kafka
    interval: 30s
    rules:
      - alert: KafkaBrokerDown
        expr: kafka_brokers < 3
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Kafka broker count low"
          description: "Less than 3 Kafka brokers are available (current: {{ $value }})"

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_group_lag > 100000
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Kafka consumer lag high"
          description: "Consumer lag is above 100k for group {{ $labels.group }} on topic {{ $labels.topic }}"

      - alert: KafkaUnderReplicatedPartitions
        expr: kafka_cluster_partition_underreplicated > 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Kafka under-replicated partitions"
          description: "There are {{ $value }} under-replicated partitions"

      - alert: KafkaOfflinePartitions
        expr: kafka_controller_kafkacontroller_offline_partitions_count > 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Kafka offline partitions"
          description: "There are {{ $value }} offline partitions"

  # ============================================================================
  # KUBERNETES ALERTS
  # ============================================================================
  - name: kubernetes
    interval: 30s
    rules:
      - alert: KubernetesNodeNotReady
        expr: |
          kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 10m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Kubernetes node not ready"
          description: "Node {{ $labels.node }} has been NotReady for more than 10 minutes"

      - alert: KubernetesPodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"

      - alert: KubernetesPodNotReady
        expr: |
          kube_pod_status_phase{phase=~"Pending|Unknown"} == 1
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod not ready"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in {{ $labels.phase }} for 15m"

      - alert: KubernetesDeploymentReplicasMismatch
        expr: |
          kube_deployment_status_replicas_available != kube_deployment_spec_replicas
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Deployment replicas mismatch"
          description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replica mismatch"

      - alert: KubernetesStatefulSetReplicasMismatch
        expr: |
          kube_statefulset_status_replicas_ready != kube_statefulset_replicas
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "StatefulSet replicas mismatch"
          description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} replica mismatch"

      - alert: KubernetesJobFailed
        expr: |
          kube_job_status_failed == 1
        for: 0m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Job failed"
          description: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed"

      - alert: KubernetesPersistentVolumeClaimPending
        expr: |
          kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "PVC pending"
          description: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is pending"

  # ============================================================================
  # INFRASTRUCTURE ALERTS
  # ============================================================================
  - name: infrastructure
    interval: 30s
    rules:
      - alert: ClickHouseDown
        expr: up{job="clickhouse-metrics"} == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "ClickHouse is down"
          description: "ClickHouse has been down for more than 2 minutes"

      - alert: MinIODown
        expr: up{job="minio-metrics"} == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "MinIO is down"
          description: "MinIO has been down for more than 2 minutes"

      - alert: PrometheusTargetMissing
        expr: up == 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Prometheus target missing"
          description: "Target {{ $labels.instance }} is missing"

      - alert: CertificateExpiringSoon
        expr: |
          (ssl_cert_not_after - time()) / 86400 < 30
        for: 1m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "SSL certificate expiring soon"
          description: "Certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}"
