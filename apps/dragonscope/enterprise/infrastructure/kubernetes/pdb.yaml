---
# Priority Classes for PDB Enforcement
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: dragonscope-critical
  labels:
    app.kubernetes.io/name: dragonscope
    priority-level: critical
value: 1000000
globalDefault: false
description: "Critical DragonScope infrastructure components that should not be preempted"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: dragonscope-high
  labels:
    app.kubernetes.io/name: dragonscope
    priority-level: high
value: 100000
globalDefault: false
description: "High priority DragonScope services"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: dragonscope-standard
  labels:
    app.kubernetes.io/name: dragonscope
    priority-level: standard
value: 10000
globalDefault: true
description: "Standard DragonScope services"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: dragonscope-low
  labels:
    app.kubernetes.io/name: dragonscope
    priority-level: low
value: 1000
globalDefault: false
description: "Low priority DragonScope batch jobs and background tasks"
