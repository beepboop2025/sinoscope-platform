# DragonScope Enterprise - Pod Disruption Budget
# Ensures minimum availability during disruptions

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dragonscope-api-pdb
  namespace: dragonscope-production
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: api-gateway
    disruption-budget: api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dragonscope
      app.kubernetes.io/component: api-gateway

