# Jaeger Service
apiVersion: v1
kind: Service
metadata:
  name: jaeger-headless
  namespace: dragonscope-monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: tracing
    service-type: headless
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 16686
      targetPort: 16686
      protocol: TCP
      name: query
    - port: 6831
      targetPort: 6831
      protocol: UDP
      name: agent-compact
    - port: 6832
      targetPort: 6832
      protocol: UDP
      name: agent-binary
    - port: 14250
      targetPort: 14250
      protocol: TCP
      name: collector-grpc
    - port: 14268
      targetPort: 14268
      protocol: TCP
      name: collector-http
    - port: 4317
      targetPort: 4317
      protocol: TCP
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      protocol: TCP
      name: otlp-http
    - port: 9411
      targetPort: 9411
      protocol: TCP
      name: zipkin
  selector:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: tracing

---
# =============================================================================
# External Access Services
# =============================================================================

# External Load Balancer for API Access
apiVersion: v1
kind: Service
metadata:
  name: dragonscope-api-external
  namespace: dragonscope-production
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: api-gateway
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "8080"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "HTTP"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/health"
spec:
  type: LoadBalancer
  ports:
    - port: 443
      targetPort: 8443
      protocol: TCP
      name: https
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: api-gateway

---
# Internal Load Balancer for Services
apiVersion: v1
kind: Service
metadata:
  name: dragonscope-internal
  namespace: dragonscope-production
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: internal-services
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: internal-services
