# DragonScope Enterprise - Service Definitions
# Comprehensive service mesh for all components

---
# =============================================================================
# Data Services
# =============================================================================

# TimescaleDB Services
apiVersion: v1
kind: Service
metadata:
  name: timescaledb-primary-headless
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: timescaledb
    app.kubernetes.io/component: primary
    service-type: headless
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: timescaledb
    app.kubernetes.io/component: primary

---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb-replica-headless
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: timescaledb
    app.kubernetes.io/component: replica
    service-type: headless
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: timescaledb
    app.kubernetes.io/component: replica

---
# Redis Cluster Services
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-headless
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cluster
    service-type: headless
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
    - port: 16379
      targetPort: 16379
      protocol: TCP
      name: cluster
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cluster

---
apiVersion: v1
kind: Service
metadata:
  name: redis-external
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cluster
    service-type: load-balancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
spec:
  type: LoadBalancer
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cluster

---
