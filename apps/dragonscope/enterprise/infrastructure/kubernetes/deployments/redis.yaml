# DragonScope Enterprise - Redis Cluster
# High Availability Redis Cluster (6 nodes: 3 masters + 3 replicas)

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cluster
    app.kubernetes.io/part-of: dragonscope-enterprise
spec:
  serviceName: redis-cluster
  replicas: 6
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/component: cluster
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: cluster
        app.kubernetes.io/part-of: dragonscope-enterprise
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - redis
              topologyKey: kubernetes.io/hostname
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
            - name: cluster
              containerPort: 16379
              protocol: TCP
          command:
            - redis-server
            - /etc/redis/redis.conf
            - --port
            - "6379"
            - --cluster-enabled
            - "yes"
            - --cluster-config-file
            - nodes.conf
            - --cluster-node-timeout
            - "5000"
            - --appendonly
            - "yes"
            - --appendfsync
            - "everysec"
            - --maxmemory
            - "2gb"
            - --maxmemory-policy
            - "allkeys-lru"
            - --requirepass
            - $(REDIS_PASSWORD)
            - --masterauth
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dragonscope-redis-credentials
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.55.0
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dragonscope-redis-credentials
                  key: REDIS_PASSWORD
          ports:
            - name: metrics
              containerPort: 9121
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: redis-config
          configMap:
            name: dragonscope-redis-config
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        storageClassName: gp3-encrypted

---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cluster
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
    - port: 16379
      targetPort: 16379
      protocol: TCP
      name: cluster
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cluster

---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-external
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cluster
spec:
  type: LoadBalancer
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cluster

---
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-cluster-init
  namespace: dragonscope-data
spec:
  template:
    spec:
      containers:
        - name: redis-cluster-init
          image: redis:7.2-alpine
          command:
            - sh
            - -c
            - |
              sleep 30
              redis-cli --cluster create \
                redis-cluster-0.redis-cluster:6379 \
                redis-cluster-1.redis-cluster:6379 \
                redis-cluster-2.redis-cluster:6379 \
                redis-cluster-3.redis-cluster:6379 \
                redis-cluster-4.redis-cluster:6379 \
                redis-cluster-5.redis-cluster:6379 \
                --cluster-replicas 1 --cluster-yes -a $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dragonscope-redis-credentials
                  key: REDIS_PASSWORD
      restartPolicy: OnFailure
