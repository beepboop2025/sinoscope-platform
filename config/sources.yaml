sources:
  # ── Indian Economy (RBI) ─────────────────────────────────────
  rbi_dbie:
    enabled: true
    schedule: "0 6 * * *"              # 6 AM IST daily
    collector_class: "collectors.rbi_dbie.RBIDbie"
    config:
      base_url: "https://dbie.rbi.org.in/DBIE"
      datasets:
        - weekly_statistical_supplement
        - forex_reserves
        - money_supply
        - sectoral_credit
        - interest_rates
        - exchange_rates

  rbi_circulars:
    enabled: true
    schedule: "0 */4 * * *"            # Every 4 hours
    collector_class: "collectors.rbi_circulars.RBICirculars"
    config:
      base_url: "https://rbi.org.in"
      types: [press_releases, notifications, circulars]

  # ── US Economy (FRED) ────────────────────────────────────────
  fred_api:
    enabled: true
    schedule: "0 */6 * * *"            # Every 6 hours
    collector_class: "collectors.fred_api.FredCollector"
    config:
      api_key: "${FRED_API_KEY}"
      series:
        - FEDFUNDS          # Fed Funds Rate
        - CPIAUCSL          # CPI (inflation)
        - DGS10             # 10-Year Treasury
        - DGS2              # 2-Year Treasury
        - DTWEXBGS          # Dollar Index
        - UNRATE            # Unemployment
        - GDP               # GDP
        - SOFR              # Secured Overnight Financing Rate
        - T10Y2Y            # 10Y-2Y Spread
        - VIXCLS            # VIX
        - BAMLH0A0HYM2      # High Yield Spread

  # ── Indian Stock Markets ─────────────────────────────────────
  nse_bhavcopy:
    enabled: true
    schedule: "30 18 * * 1-5"          # 6:30 PM IST weekdays
    collector_class: "collectors.nse_bhavcopy.NSEBhavcopy"
    config:
      types: [equity, derivatives, fii_dii]

  bse_api:
    enabled: true
    schedule: "0 19 * * 1-5"           # 7 PM IST weekdays
    collector_class: "collectors.bse_api.BSECollector"
    config:
      types: [corporate_actions, board_meetings, results]

  # ── Money Market Rates ───────────────────────────────────────
  ccil_rates:
    enabled: true
    schedule: "0 17 * * 1-5"           # 5 PM IST weekdays
    collector_class: "collectors.ccil_rates.CCILCollector"
    config:
      data_types:
        - fbil_reference_rates
        - sovereign_yield_curve
        - mibor
        - treps_rates
        - cp_rates
        - cd_rates

  # ── India Government Data ────────────────────────────────────
  data_gov_in:
    enabled: true
    schedule: "0 8 * * *"              # 8 AM IST daily
    collector_class: "collectors.data_gov_in.DataGovCollector"
    config:
      api_key: "${DATA_GOV_API_KEY}"
      datasets:
        - cpi_monthly
        - wpi_monthly
        - iip_monthly
        - gdp_quarterly
        - gst_collections

  # ── SEBI ─────────────────────────────────────────────────────
  sebi_circulars:
    enabled: true
    schedule: "0 */6 * * *"            # Every 6 hours
    collector_class: "collectors.sebi_circulars.SEBICollector"
    config:
      base_url: "https://www.sebi.gov.in"
      types: [circulars, orders, press_releases]

  # ── International ────────────────────────────────────────────
  world_bank:
    enabled: true
    schedule: "0 0 * * 0"              # Weekly (Sunday midnight)
    collector_class: "collectors.world_bank.WorldBankCollector"
    config:
      indicators:
        - NY.GDP.MKTP.CD       # GDP
        - FP.CPI.TOTL.ZG       # Inflation
        - BN.CAB.XOKA.CD       # Current Account
      countries: [IN, US, CN, GB, JP, DE]

  imf_data:
    enabled: true
    schedule: "0 0 1 * *"              # Monthly (1st day)
    collector_class: "collectors.imf_data.IMFCollector"
    config:
      datasets:
        - IFS               # International Financial Statistics
        - DOT               # Direction of Trade
        - BOP               # Balance of Payments

  # ── News & Social ────────────────────────────────────────────
  rss_feeds:
    enabled: true
    schedule: "*/5 * * * *"            # Every 5 minutes
    collector_class: "collectors.rss_feeds.RSSCollector"
    config:
      feeds:
        - name: reuters_business
          url: "https://feeds.reuters.com/reuters/businessNews"
          category: global_markets
        - name: reuters_markets
          url: "https://feeds.reuters.com/reuters/marketsNews"
          category: global_markets
        - name: et_economy
          url: "https://economictimes.indiatimes.com/news/economy/rssfeedstopstories.cms"
          category: india_economy
        - name: et_markets
          url: "https://economictimes.indiatimes.com/markets/rssfeeds/1977021501.cms"
          category: india_markets
        - name: mint_economy
          url: "https://www.livemint.com/rss/economy"
          category: india_economy
        - name: mint_markets
          url: "https://www.livemint.com/rss/markets"
          category: india_markets
        - name: moneycontrol
          url: "https://www.moneycontrol.com/rss/latestnews.xml"
          category: india_markets
        - name: rbi_press
          url: "https://rbi.org.in/Scripts/BS_PressReleaseDisplay.aspx"
          category: rbi_policy
        - name: fed_press
          url: "https://www.federalreserve.gov/feeds/press_all.xml"
          category: fed_policy
        - name: ecb_press
          url: "https://www.ecb.europa.eu/rss/press.html"
          category: ecb_policy
        - name: coindesk
          url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
          category: crypto
        - name: cnbc
          url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10000664"
          category: global_markets
        - name: ft_markets
          url: "https://www.ft.com/markets?format=rss"
          category: global_markets
        - name: arxiv_qfin
          url: "https://rss.arxiv.org/rss/q-fin"
          category: research

  telegram_channels:
    enabled: true
    schedule: "*/10 * * * *"           # Every 10 minutes
    collector_class: "collectors.telegram_channels.TelegramCollector"
    config:
      api_id: "${TELEGRAM_API_ID}"
      api_hash: "${TELEGRAM_API_HASH}"
      channels:
        - BloombergMarketsLive
        - financialjuice
        - WallStreetSilverOfficial
        - raboratory

  twitter_lists:
    enabled: true
    schedule: "*/5 * * * *"            # Every 5 minutes
    collector_class: "collectors.twitter_lists.TwitterListCollector"
    config:
      cookies_path: "${TWITTER_COOKIES_PATH}"
      queries:
        - "RBI monetary policy"
        - "SEBI circular"
        - "Indian stock market"
        - "MIBOR SOFR rate"
        - "treasury yield"
        - "Fed rate decision"

  # ── DDTI feasibility probe (censorship-as-signal) ────────────
  ddti_probe:
    enabled: false                     # enable after scripts/ddti_feasibility.py returns GO
    schedule: "*/15 * * * *"           # every 15 min once live
    collector_class: "collectors.ddti_probe.DDTIProbeCollector"
    config:
      deletion_feeds:
        - name: cdt_english
          url: "https://chinadigitaltimes.net/feed/"
        - name: cdt_minitrue
          url: "https://chinadigitaltimes.net/china/minitrue/feed/"
        - name: cdt_chinese
          url: "https://chinadigitaltimes.net/chinese/feed/"

  # ── China Social (Weibo hot search) ──────────────────────────
  weibo_hotsearch:
    enabled: true
    schedule: "*/10 * * * *"           # Every 10 minutes (hot list churns fast)
    collector_class: "collectors.weibo_hotsearch.WeiboHotSearchCollector"
    config:
      # Used by _is_financially_relevant() — extend with your domain terms.
      finance_keywords:
        - "A股"        # A-shares
        - "股市"        # stock market
        - "央行"        # central bank (PBOC)
        - "降准"        # RRR cut
        - "降息"        # rate cut
        - "加息"        # rate hike
        - "人民币"      # RMB / yuan
        - "楼市"        # property market
        - "房地产"      # real estate
        - "经济"        # economy
        - "通胀"        # inflation
        - "GDP"

  # ── China Economic Conditions Engine (CBB) ───────────────────
  comtrade_mirror:
    enabled: true
    schedule: "0 */6 * * *"            # Every 6 hours
    collector_class: "collectors.comtrade_mirror.ComtradeMirrorCollector"
    config:
      base_url: "https://comtradeapi.un.org/data/v1/get"
      # Optional API key. Leave empty to run unauthenticated; the collector will
      # also check the COMTRADE_API_KEY environment variable if this is blank.
      api_key: ""
      reporter_code: 156               # China
      partner_code_world: 0            # World aggregate
      flows: ["M", "X"]                # Imports / Exports
      hs_chapters:
        - "84"   # Nuclear reactors, boilers, machinery
        - "85"   # Electrical machinery
        - "62"   # Apparel (not knit)
        - "61"   # Apparel (knit)
        - "72"   # Iron and steel
        - "73"   # Articles of iron/steel
        - "39"   # Plastics
        - "27"   # Mineral fuels
        - "71"   # Natural/cultured pearls, precious metals
        - "90"   # Optical, medical, precision instruments
        - "87"   # Vehicles (autos)
        - "94"   # Furniture
        - "95"   # Toys, games, sports equipment
      mirror_partners:
        - 842   # United States
        - 392   # Japan
        - 276   # Germany
        - 410   # South Korea
        - 704   # Vietnam
        - 528   # Netherlands
        - 356   # India
        - 826   # United Kingdom
        - 702   # Singapore
        - 36    # Australia
        - 124   # Canada
        - 458   # Malaysia
        - 764   # Thailand
        - 380   # Italy
        - 251   # France
      recent_months: 6
      timeout: 60
      rate_limit: 1.0

  cn_indicators:
    enabled: true
    schedule: "0 7 * * *"              # 7 AM UTC daily
    collector_class: "collectors.cn_indicators.CNIndicatorsCollector"
    config:
      enabled_sources:
        # ── Freight / logistics ─────────────────────────────────
        - key: bdi
          name_zh: 波罗的海干散货指数
          name_en: Baltic Dry Index
          url: "https://tradingeconomics.com/commodity/baltic"
          method: GET
          parser: json
          unit: index
          sector: transport_logistics
          access: todo
          note: "Daily bulk-shipping proxy. Public page; requires scraper or FRED API key."
        - key: ccfi
          name_zh: 中国出口集装箱运价指数
          name_en: China Containerized Freight Index
          url: "http://www.sse.net.cn/index/singleIndex?indexType=ccfi"
          method: GET
          parser: json
          unit: index
          sector: transport_logistics
          access: scrape
          note: "Shanghai Shipping Exchange; HTML table scrape."
        - key: scfi
          name_zh: 上海出口集装箱运价指数
          name_en: Shanghai Containerized Freight Index
          url: "http://www.sse.net.cn/index/singleIndex?indexType=scfi"
          method: GET
          parser: json
          unit: index
          sector: transport_logistics
          access: scrape
          note: "Shanghai Shipping Exchange; HTML table scrape."

        # ── Trade hubs ──────────────────────────────────────────
        - key: yiwu_index
          name_zh: 义乌中国小商品指数
          name_en: Yiwu China Commodity Index
          url: "http://www.ywindex.com/"
          method: GET
          parser: json
          unit: index
          sector: trade
          access: todo
          note: "Yiwu small-commodity wholesale benchmark; scrape or partner feed required."

        # ── Autos ───────────────────────────────────────────────
        - key: cpca_retail_pv
          name_zh: 乘联会乘用车零售销量
          name_en: CPCA Passenger Vehicle Retail Sales
          url: "https://www.cpauto.com.cn/"
          method: GET
          parser: json
          unit: units
          sector: automotive
          access: todo
          note: "CPCA publishes via WeChat/website; requires scrape or data partner."
        - key: cpca_wholesale_pv
          name_zh: 乘联会乘用车批发销量
          name_en: CPCA Passenger Vehicle Wholesale Sales
          url: "https://www.cpauto.com.cn/"
          method: GET
          parser: json
          unit: units
          sector: automotive
          access: todo
          note: "CPCA publishes via WeChat/website; requires scrape or data partner."

        # ── Steel ───────────────────────────────────────────────
        - key: steel_price_index
          name_zh: 中国钢材价格指数
          name_en: China Steel Price Index
          url: "https://www.mysteel.com/"
          method: GET
          parser: json
          unit: CNY/t
          sector: steel
          access: todo
          note: "Mysteel/Myspic index is commercial; public alternative under review."

        # ── Cement ──────────────────────────────────────────────
        - key: cement_price_index
          name_zh: 中国水泥价格指数
          name_en: China Cement Price Index
          url: "https://www.ccement.com/"
          method: GET
          parser: json
          unit: CNY/t
          sector: construction_materials
          access: todo
          note: "Cement price regional averages; requires scrape."

        # ── Coal / energy ───────────────────────────────────────
        - key: coal_price_index
          name_zh: 中国煤炭价格指数
          name_en: China Coal Price Index
          url: "https://www.cctd.com.cn/"
          method: GET
          parser: json
          unit: CNY/t
          sector: energy
          access: todo
          note: "Coal price benchmarks (e.g., CCI, CCTD); commercial/scrape."

        # ── Property ────────────────────────────────────────────
        - key: property_price_index
          name_zh: 商品住宅销售价格指数
          name_en: China Property Price Index
          url: "https://www.stats.gov.cn/tjsj/"
          method: GET
          parser: json
          unit: index
          sector: property
          access: todo
          note: "NBS monthly property price data; PDF/HTML tables."

        # ── Mobility ────────────────────────────────────────────
        - key: baidu_mobility
          name_zh: 百度迁徙/出行指数
          name_en: Baidu Migration/Mobility Index
          url: "https://qianxi.baidu.com/"
          method: GET
          parser: json
          unit: index
          sector: consumer_mobility
          access: todo
          note: "Public dashboards but no stable open API; scrape or API partnership."

        # ── Macro ───────────────────────────────────────────────
        - key: pboc_lpr
          name_zh: 贷款市场报价利率
          name_en: PBOC Loan Prime Rate
          url: "http://www.pbc.gov.cn/zhengcehuobisi/11111/index.html"
          method: GET
          parser: json
          unit: pct
          sector: macro
          access: todo
          note: "Monthly 1Y/5Y LPR; official PBOC site, HTML tables."
