# Chaos Experiment: Resource Stress Testing
# Tests system behavior under resource pressure

apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: api-cpu-stress
  namespace: chaos-testing
spec:
  mode: one
  selector:
    namespaces:
      - dragonscope
    labelSelectors:
      app: dragonscope-api
  stressors:
    cpu:
      workers: 4
      load: 80  # 80% CPU utilization
  duration: "5m"

---
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: api-memory-stress
  namespace: chaos-testing
spec:
  mode: one
  selector:
    namespaces:
      - dragonscope
    labelSelectors:
      app: dragonscope-api
  stressors:
    memory:
      workers: 4
      size: "512Mi"  # Allocate 512MB
      oomScoreAdj: 100
  duration: "5m"

---
apiVersion: chaos-mesh.org/v1alpha1
kind: IOChaos
metadata:
  name: database-io-latency
  namespace: chaos-testing
spec:
  action: latency
  mode: all
  selector:
    namespaces:
      - dragonscope
    labelSelectors:
      app: postgres
  volumePath: /var/lib/postgresql/data
  path: ""
  delay: "100ms"
  percent: 50
  duration: "5m"

---
apiVersion: chaos-mesh.org/v1alpha1
kind: IOChaos
metadata:
  name: database-io-error
  namespace: chaos-testing
spec:
  action: fault
  mode: all
  selector:
    namespaces:
      - dragonscope
    labelSelectors:
      app: postgres
  volumePath: /var/lib/postgresql/data
  path: ""
  errno: 5  # EIO - I/O error
  percent: 10
  duration: "3m"
