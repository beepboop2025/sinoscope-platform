[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to ignore
norecursedirs = .git .tox build dist *.egg node_modules .pytest_cache

# Add src to path
pythonpath = 
    ../src
    .

# Async configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (requires external services)
    e2e: End-to-end tests (full system)
    slow: Slow tests (skip in quick runs)
    flaky: Flaky tests (retry on failure)
    chaos: Chaos engineering experiments
    load: Load/performance tests
    db: Database-dependent tests
    cache: Cache-dependent tests
    websocket: WebSocket tests
    api: API tests
    security: Security-related tests

# Warnings filter
filterwarnings =
    ignore::DeprecationWarning:asyncio.*:
    ignore::UserWarning:pydantic.*:
    error::RuntimeWarning

# Coverage configuration
cov_report = 
    term-missing
    html:htmlcov
    xml:coverage.xml

# Test execution
addopts = 
    -v
    --strict-markers
    --tb=short
    --strict-config
    -ra

# Environment variables for tests
env =
    DRAGONSCOPE_ENV=test
    PYTHONDONTWRITEBYTECODE=1
    PYTHONUNBUFFERED=1

# Timeout settings (requires pytest-timeout)
timeout = 60
timeout_method = thread

# Parallel execution (requires pytest-xdist)
# -n auto
# --dist=loadfile

# HTML report (requires pytest-html)
# --html=report.html --self-contained-html
