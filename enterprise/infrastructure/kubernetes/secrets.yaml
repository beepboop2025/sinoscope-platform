# DragonScope Enterprise - Kubernetes Secrets
# NOTE: This is a TEMPLATE. Never commit real credentials to git.
# In production, use external secret management:
#   - AWS Secrets Manager + ExternalSecrets Operator
#   - HashiCorp Vault
#   - Sealed Secrets
#
# Usage:
#   1. Copy this file to secrets.local.yaml (gitignored)
#   2. Fill in real values
#   3. kubectl apply -f secrets.local.yaml

---
apiVersion: v1
kind: Secret
metadata:
  name: dragonscope-db-credentials
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: ""          # Set your database username
  POSTGRES_PASSWORD: ""      # Set a strong password
  POSTGRES_DB: "dragonscope_data"
  POSTGRES_REPLICA_USER: ""  # Set replication username
  POSTGRES_REPLICA_PASSWORD: "" # Set replication password
  DATABASE_URL: ""           # postgresql://user:pass@host:5432/db?sslmode=require
  REPLICA_URL: ""            # postgresql://user:pass@replica:5432/db?sslmode=require

