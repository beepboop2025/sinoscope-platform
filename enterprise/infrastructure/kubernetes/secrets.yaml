---
# External Secrets Operator Configuration
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: dragonscope-aws-secrets
  namespace: dragonscope-production
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dragonscope-db-credentials-external
  namespace: dragonscope-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: dragonscope-aws-secrets
  target:
    name: dragonscope-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: dragonscope/production/database
        property: password
    - secretKey: POSTGRES_USER
      remoteRef:
        key: dragonscope/production/database
        property: username
