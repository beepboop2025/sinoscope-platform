# DragonScope Enterprise - Kubernetes Secrets
# NOTE: These are template secrets. In production, use external secret management
# like AWS Secrets Manager, HashiCorp Vault, or sealed-secrets

---
apiVersion: v1
kind: Secret
metadata:
  name: dragonscope-db-credentials
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # TimescaleDB Credentials
  POSTGRES_USER: "dragonscope"
  POSTGRES_PASSWORD: "dragonscope_secure_2024!@#$"
  POSTGRES_DB: "dragonscope_data"
  POSTGRES_REPLICA_USER: "replicator"
  POSTGRES_REPLICA_PASSWORD: "replica_secure_2024!@#$"
  
  # Connection Strings
  DATABASE_URL: "postgresql://dragonscope:dragonscope_secure_2024!@#$@timescale-primary:5432/dragonscope_data?sslmode=require"
  REPLICA_URL: "postgresql://replicator:replica_secure_2024!@#$@timescale-replica:5432/dragonscope_data?sslmode=require"

---
apiVersion: v1
kind: Secret
metadata:
  name: dragonscope-redis-credentials
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: cache
type: Opaque
stringData:
  # Redis Credentials
  REDIS_PASSWORD: "redis_secure_2024!@#$"
  REDIS_CLUSTER_PASSWORD: "redis_cluster_secure_2024!@#$"
  
  # Connection Strings
  REDIS_URL: "redis://:redis_secure_2024!@#$@redis-cluster:6379/0"
  REDIS_CLUSTER_URL: "redis://:redis_cluster_secure_2024!@#$@redis-cluster:6379/0"

---
apiVersion: v1
kind: Secret
metadata:
  name: dragonscope-kafka-credentials
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: messaging
type: Opaque
stringData:
  # Kafka Credentials
  KAFKA_USERNAME: "dragonscope"
  KAFKA_PASSWORD: "kafka_secure_2024!@#$"
  KAFKA_SASL_MECHANISM: "SCRAM-SHA-512"
  
  # Connection Strings
  KAFKA_BOOTSTRAP_SERVERS: "kafka-0:9092,kafka-1:9092,kafka-2:9092"
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  
  # JAAS Configuration
  KAFKA_JAAS_CONFIG: |
    org.apache.kafka.common.security.scram.ScramLoginModule required
    username="dragonscope"
    password="kafka_secure_2024!@#$";

---
apiVersion: v1
kind: Secret
metadata:
  name: dragonscope-clickhouse-credentials
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: analytics
type: Opaque
stringData:
  # ClickHouse Credentials
  CLICKHOUSE_USER: "clickhouse"
  CLICKHOUSE_PASSWORD: "clickhouse_secure_2024!@#$"
  CLICKHOUSE_DB: "dragonscope_analytics"
  
  # Connection Strings
  CLICKHOUSE_URL: "http://clickhouse:8123"
  CLICKHOUSE_NATIVE_URL: "clickhouse://clickhouse:9000"

---
apiVersion: v1
kind: Secret
metadata:
  name: dragonscope-minio-credentials
  namespace: dragonscope-data
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: storage
type: Opaque
stringData:
  # MinIO Credentials
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "minio_secure_2024_root!@#$"
  
  # Access Keys
  MINIO_ACCESS_KEY: "dragonscope-access-key"
  MINIO_SECRET_KEY: "dragonscope-secret-key-2024!@#$"
  
  # Connection
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_REGION: "us-east-1"

---
apiVersion: v1
kind: Secret
metadata:
  name: dragonscope-app-secrets
  namespace: dragonscope-production
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: application
type: Opaque
stringData:
  # Application Secrets
  APP_SECRET_KEY: "dragonscope_app_secret_2024_very_long_random_string_for_security"
  JWT_SECRET: "dragonscope_jwt_secret_2024_signing_key_hs256"
  SESSION_SECRET: "dragonscope_session_secret_2024_cookie_encryption"
  
  # Encryption Keys
  ENCRYPTION_KEY: "dragonscope_encryption_key_2024_aes_256_gcm"
  DATA_ENCRYPTION_KEY: "dragonscope_data_encryption_key_2024_field_level"
  
  # API Keys (External Services)
  STRIPE_API_KEY: "sk_live_dragonscope_stripe_2024"
  SENDGRID_API_KEY: "SG.dragonscope_sendgrid_2024"
  
  # OAuth Secrets
  GOOGLE_CLIENT_SECRET: "dragonscope_google_oauth_secret_2024"
  GITHUB_CLIENT_SECRET: "dragonscope_github_oauth_secret_2024"
  
  # Webhook Secrets
  WEBHOOK_SECRET: "dragonscope_webhook_signature_secret_2024"

---
apiVersion: v1
kind: Secret
metadata:
  name: dragonscope-monitoring-credentials
  namespace: dragonscope-monitoring
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: monitoring
type: Opaque
stringData:
  # Grafana
  GRAFANA_ADMIN_USER: "admin"
  GRAFANA_ADMIN_PASSWORD: "grafana_admin_secure_2024!@#$"
  
  # Prometheus
  PROMETHEUS_BASIC_AUTH_USER: "prometheus"
  PROMETHEUS_BASIC_AUTH_PASSWORD: "prometheus_secure_2024!@#$"
  
  # Alertmanager
  ALERTMANAGER_BASIC_AUTH_USER: "alertmanager"
  ALERTMANAGER_BASIC_AUTH_PASSWORD: "alertmanager_secure_2024!@#$"
  
  # PagerDuty Integration
  PAGERDUTY_SERVICE_KEY: "dragonscope_pagerduty_integration_key_2024"
  
  # Slack Webhooks
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/DRAGONSCOPE/WEBHOOK/TOKEN"
  
  # OpsGenie
  OPSGENIE_API_KEY: "dragonscope_opsgenie_api_key_2024"

