---
# Web Application Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dragonscope-web-ingress
  namespace: dragonscope-production
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: web
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "500"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: dragonscope-ingress
  tls:
    - hosts:
        - app.dragonscope.io
        - www.dragonscope.io
      secretName: dragonscope-web-tls
  rules:
    - host: app.dragonscope.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dragonscope-web
                port:
                  number: 80
    - host: www.dragonscope.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dragonscope-web
                port:
                  number: 80

