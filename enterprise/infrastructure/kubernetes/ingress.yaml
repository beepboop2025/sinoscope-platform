# DragonScope Enterprise - Ingress Configuration
# NGINX Ingress Controller with TLS and Rate Limiting

---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: dragonscope-ingress
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: k8s.io/ingress-nginx

---
# API Gateway Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dragonscope-api-ingress
  namespace: dragonscope-production
  labels:
    app.kubernetes.io/name: dragonscope
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.dragonscope.io,https://admin.dragonscope.io"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key"
spec:
  ingressClassName: dragonscope-ingress
  tls:
    - hosts:
        - api.dragonscope.io
      secretName: dragonscope-api-tls
  rules:
    - host: api.dragonscope.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dragonscope-api
                port:
                  number: 8080

---
# Grafana Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: dragonscope-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: dragonscope-monitoring-credentials
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required - Grafana"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: dragonscope-ingress
  tls:
    - hosts:
        - grafana.dragonscope.io
      secretName: dragonscope-grafana-tls
  rules:
    - host: grafana.dragonscope.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

