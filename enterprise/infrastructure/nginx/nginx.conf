# DragonScope Enterprise Nginx Configuration
# High-performance reverse proxy with SSL, WebSocket support, and rate limiting

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Load modules
dso {
    # Load dynamic modules if needed
    # load ngx_http_js_module.so;
}

events {
    worker_connections 16384;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================================================
    # Logging Format
    # ========================================================================
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time $upstream_response_time '
                    '$upstream_addr $upstream_status '
                    '$http_x_request_id $http_x_tenant_id';

    log_format json_analytics escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"http_host":"$http_host",'
        '"http_x_request_id":"$http_x_request_id",'
        '"http_x_tenant_id":"$http_x_tenant_id",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"http_user_agent":"$http_user_agent",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher"'
    '}';

    access_log /var/log/nginx/access.log main;
    # access_log /var/log/nginx/access.json.log json_analytics;

    # ========================================================================
    # Performance Tuning
    # ========================================================================
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    keepalive_timeout 65;
    keepalive_requests 1000;
    
    # Connection and request limits
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;
    
    # Rate limiting by tenant
    limit_req_zone $http_x_tenant_id zone=tenant_limit:50m rate=1000r/m;
    
    # Rate limiting by API key
    limit_req_zone $http_x_api_key zone=api_key_limit:10m rate=100r/s;

    # ========================================================================
    # Gzip Compression
    # ========================================================================
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml;
    gzip_min_length 1000;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    # ========================================================================
    # Brotli Compression (if module available)
    # ========================================================================
    
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ========================================================================
    # SSL/TLS Configuration
    # ========================================================================
    
    # SSL Session Cache
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Modern TLS Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    
    # Strong cipher suite
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ========================================================================
    # Proxy Settings
    # ========================================================================
    
    proxy_http_version 1.1;
    proxy_cache_bypass $http_upgrade;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    proxy_temp_file_write_size 64k;
    proxy_max_temp_file_size 1024m;

    # ========================================================================
    # Upstream Definitions
    # ========================================================================
    
    # API Gateway upstream
    upstream api_gateway {
        least_conn;
        
        server gateway-1:8080 weight=5 max_fails=3 fail_timeout=30s;
        server gateway-2:8080 weight=5 max_fails=3 fail_timeout=30s;
        server gateway-3:8080 weight=5 max_fails=3 fail_timeout=30s;
        
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }
    
    # WebSocket upstream
    upstream websocket_backend {
        ip_hash;
        
        server ws-1:8080 max_fails=3 fail_timeout=30s;
        server ws-2:8080 max_fails=3 fail_timeout=30s;
        server ws-3:8080 max_fails=3 fail_timeout=30s backup;
        
        keepalive 16;
    }
    
    # Static file upstream (CDN origin)
    upstream static_origin {
        server static-1:8080 weight=5;
        server static-2:8080 weight=5;
        
        keepalive 32;
    }
    
    # Admin panel upstream
    upstream admin_panel {
        server admin-1:3000 max_fails=3 fail_timeout=30s;
        server admin-2:3000 backup;
    }

    # ========================================================================
    # Cache Configuration
    # ========================================================================
    
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:100m 
                     max_size=10g inactive=60m use_temp_path=off;
    
    proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:500m 
                     max_size=50g inactive=7d use_temp_path=off;

    # ========================================================================
    # GeoIP Configuration (if module available)
    # ========================================================================
    
    # geoip_country /etc/nginx/geoip/GeoIP.dat;
    # geoip_city /etc/nginx/geoip/GeoLiteCity.dat;
    
    # map $geoip_country_code $allowed_country {
    #     default yes;
    #     CN no;
    #     RU no;
    # }

    # ========================================================================
    # Server Blocks
    # ========================================================================
    
    # HTTP to HTTPS redirect
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        
        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            return 301 https://$host$request_uri;
        }
    }
    
    # Main HTTPS Server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        
        server_name api.dragonscope.io;
        
        # SSL Certificates (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/api.dragonscope.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.dragonscope.io/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/api.dragonscope.io/chain.pem;
        
        # Request ID for tracing
        add_header X-Request-ID $request_id always;
        
        # ========================================================================
        # Rate Limiting
        # ========================================================================
        
        # Connection limit per IP
        limit_conn conn_limit 50;
        
        # Request rate limit per IP (burst allows temporary spikes)
        limit_req zone=req_limit burst=20 nodelay;
        
        # Tenant rate limiting (if header present)
        limit_req zone=tenant_limit burst=100 nodelay;
        
        # ========================================================================
        # Health Check Endpoint
        # ========================================================================
        
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # ========================================================================
        # WebSocket Configuration
        # ========================================================================
        
        location /ws/ {
            proxy_pass http://websocket_backend;
            
            # WebSocket specific headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Longer timeout for WebSocket
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable buffering for WebSocket
            proxy_buffering off;
            
            # WebSocket rate limiting (separate zone)
            limit_req zone=req_limit burst=50 nodelay;
        }
        
        location /socket.io/ {
            proxy_pass http://websocket_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_buffering off;
        }
        
        # ========================================================================
        # Static Assets
        # ========================================================================
        
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://static_origin;
            proxy_cache static_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Cache-Status $upstream_cache_status always;
            
            access_log off;
        }
        
        # ========================================================================
        # API Version 1
        # ========================================================================
        
        location /v1/ {
            proxy_pass http://api_gateway/v1/;
            
            # API caching for GET requests
            proxy_cache api_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_methods GET HEAD;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_x_tenant_id";
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            
            # Cache bypass headers
            proxy_cache_bypass $http_cache_control;
            proxy_no_cache $http_authorization;
            
            add_header X-Cache-Status $upstream_cache_status always;
            
            # CORS headers (if not handled by upstream)
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Request-ID,X-Tenant-ID" always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }
        
        # ========================================================================
        # API Version 2
        # ========================================================================
        
        location /v2/ {
            proxy_pass http://api_gateway/v2/;
            
            proxy_cache api_cache;
            proxy_cache_valid 200 2m;
            proxy_cache_valid 404 1m;
            proxy_cache_methods GET HEAD;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_x_tenant_id";
            
            add_header X-Cache-Status $upstream_cache_status always;
            
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Request-ID,X-Tenant-ID" always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }
        
        # ========================================================================
        # Analytics Endpoints (lower cache time)
        # ========================================================================
        
        location /v1/analytics/ {
            proxy_pass http://api_gateway/v1/analytics/;
            
            # Minimal caching for analytics
            proxy_cache api_cache;
            proxy_cache_valid 200 30s;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_x_tenant_id$args";
            
            add_header X-Cache-Status $upstream_cache_status always;
        }
        
        # ========================================================================
        # Admin Panel
        # ========================================================================
        
        location /admin/ {
            # IP whitelist for admin
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # deny all;
            
            proxy_pass http://admin_panel/;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
        
        # ========================================================================
        # Catch-all API
        # ========================================================================
        
        location / {
            proxy_pass http://api_gateway/;
            
            # No caching for uncategorized requests
            proxy_cache off;
        }
        
        # ========================================================================
        # Error Pages
        # ========================================================================
        
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        error_page 429 /429.html;
        location = /429.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
    
    # Wildcard subdomain for tenant isolation
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        
        server_name ~^(?<tenant>.+)\.dragonscope\.io$;
        
        ssl_certificate /etc/letsencrypt/live/dragonscope.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dragonscope.io/privkey.pem;
        
        # Add tenant ID header based on subdomain
        proxy_set_header X-Tenant-ID $tenant;
        
        location / {
            proxy_pass http://api_gateway/;
            proxy_set_header X-Tenant-ID $tenant;
        }
    }
}

# ==============================================================================
# Stream Configuration (for TCP/UDP load balancing)
# ==============================================================================

stream {
    # PostgreSQL read replicas
    upstream postgres_read {
        least_conn;
        server db-read-1:5432 max_fails=3 fail_timeout=30s;
        server db-read-2:5432 max_fails=3 fail_timeout=30s;
        server db-read-3:5432 max_fails=3 fail_timeout=30s backup;
    }
    
    # Redis cluster
    upstream redis_cluster {
        hash $remote_addr consistent;
        server redis-1:6379 max_fails=3 fail_timeout=30s;
        server redis-2:6379 max_fails=3 fail_timeout=30s;
        server redis-3:6379 max_fails=3 fail_timeout=30s;
    }
    
    # PostgreSQL proxy
    server {
        listen 5432;
        proxy_pass postgres_read;
        proxy_timeout 3s;
        proxy_connect_timeout 1s;
    }
    
    # Redis proxy
    server {
        listen 6379;
        proxy_pass redis_cluster;
        proxy_timeout 3s;
        proxy_connect_timeout 1s;
    }
}
