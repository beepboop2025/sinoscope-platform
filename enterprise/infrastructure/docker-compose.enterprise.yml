# DragonScope Enterprise - Production Data Infrastructure
# High Availability Docker Compose Configuration
# Version: 1.0.0

version: '3.8'

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  dragonscope-dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
  dragonscope-backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.1.0/24
  dragonscope-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.2.0/24

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  # TimescaleDB Volumes
  timescale-primary-data:
    driver: local
  timescale-replica-1-data:
    driver: local
  timescale-replica-2-data:
    driver: local
  
  # ClickHouse Volumes
  clickhouse-data:
    driver: local
  clickhouse-logs:
    driver: local
  
  # Kafka Volumes
  kafka-1-data:
    driver: local
  kafka-2-data:
    driver: local
  kafka-3-data:
    driver: local
  
  # Zookeeper Volumes
  zookeeper-1-data:
    driver: local
  zookeeper-2-data:
    driver: local
  zookeeper-3-data:
    driver: local
  
  # MinIO Volumes
  minio-data-1:
    driver: local
  minio-data-2:
    driver: local
  minio-data-3:
    driver: local
  minio-data-4:
    driver: local
  
  # Monitoring Volumes
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  jaeger-data:
    driver: local
  alertmanager-data:
    driver: local
  
  # Redis Volumes
  redis-node-1-data:
    driver: local
  redis-node-2-data:
    driver: local
  redis-node-3-data:
    driver: local
  redis-node-4-data:
    driver: local
  redis-node-5-data:
    driver: local
  redis-node-6-data:
    driver: local

# =============================================================================
# SERVICES
# =============================================================================
services:
  # ===========================================================================
  # ZOOKEEPER CLUSTER (Required for Kafka)
  # ===========================================================================
  zookeeper-1:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dragonscope-zookeeper-1
    hostname: zookeeper-1
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    volumes:
      - zookeeper-1-data:/var/lib/zookeeper/data
      - zookeeper-1-data:/var/lib/zookeeper/log
    networks:
      - dragonscope-backend
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  zookeeper-2:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dragonscope-zookeeper-2
    hostname: zookeeper-2
    environment:
      ZOOKEEPER_SERVER_ID: 2
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    volumes:
      - zookeeper-2-data:/var/lib/zookeeper/data
      - zookeeper-2-data:/var/lib/zookeeper/log
    networks:
      - dragonscope-backend
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  zookeeper-3:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dragonscope-zookeeper-3
    hostname: zookeeper-3
    environment:
      ZOOKEEPER_SERVER_ID: 3
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    volumes:
      - zookeeper-3-data:/var/lib/zookeeper/data
      - zookeeper-3-data:/var/lib/zookeeper/log
    networks:
      - dragonscope-backend
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ===========================================================================
  # KAFKA CLUSTER (3 Brokers for HA)
  # ===========================================================================
  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dragonscope-kafka-1
    hostname: kafka-1
    depends_on:
      zookeeper-1:
        condition: service_healthy
      zookeeper-2:
        condition: service_healthy
      zookeeper-3:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,INTERNAL://kafka-1:19092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka-1
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - dragonscope-backend
      - dragonscope-dmz
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dragonscope-kafka-2
    hostname: kafka-2
    depends_on:
      zookeeper-1:
        condition: service_healthy
      zookeeper-2:
        condition: service_healthy
      zookeeper-3:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,INTERNAL://kafka-2:19092,EXTERNAL://localhost:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka-2
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - dragonscope-backend
    ports:
      - "29093:29093"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dragonscope-kafka-3
    hostname: kafka-3
    depends_on:
      zookeeper-1:
        condition: service_healthy
      zookeeper-2:
        condition: service_healthy
      zookeeper-3:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092,INTERNAL://kafka-3:19092,EXTERNAL://localhost:29094
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka-3
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    networks:
      - dragonscope-backend
    ports:
      - "29094:29094"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  # ===========================================================================
  # KAFKA UI (Management Interface)
  # ===========================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.1
    container_name: dragonscope-kafka-ui
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    environment:
      KAFKA_CLUSTERS_0_NAME: dragonscope-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_CLUSTERS_0_READONLY: "false"
      AUTH_TYPE: "LOGIN_FORM"
      SPRING_SECURITY_USER_NAME: ${KAFKA_UI_USER:-admin}
      SPRING_SECURITY_USER_PASSWORD: ${KAFKA_UI_PASSWORD:?KAFKA_UI_PASSWORD must be set}
    networks:
      - dragonscope-backend
      - dragonscope-dmz
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped

  # ===========================================================================
  # TIMESCALEDB CLUSTER (Primary + 2 Replicas)
  # ===========================================================================
  timescale-primary:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: dragonscope-timescale-primary
    hostname: timescale-primary
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dragonscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: dragonscope_data
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - timescale-primary-data:/var/lib/postgresql/data
      - ./init-scripts/timescale:/docker-entrypoint-initdb.d:ro
    networks:
      - dragonscope-backend
    ports:
      - "5432:5432"
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c maintenance_work_mem=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=5242kB
      -c min_wal_size=2GB
      -c max_wal_size=8GB
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_parallel_maintenance_workers=4
      -c synchronous_commit=remote_apply
      -c synchronous_standby_names='timescale-replica-1,timescale-replica-2'
      -c wal_level=replica
      -c hot_standby=on
      -c max_wal_senders=10
      -c max_replication_slots=10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dragonscope} -d dragonscope_data"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    restart: unless-stopped

  timescale-replica-1:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: dragonscope-timescale-replica-1
    hostname: timescale-replica-1
    depends_on:
      timescale-primary:
        condition: service_healthy
    environment:
      PGUSER: ${POSTGRES_REPLICA_USER:-replicator}
      PGPASSWORD: ${POSTGRES_REPLICA_PASSWORD:?POSTGRES_REPLICA_PASSWORD must be set}
    volumes:
      - timescale-replica-1-data:/var/lib/postgresql/data
    networks:
      - dragonscope-backend
    ports:
      - "5433:5432"
    command: >
      bash -c "
      rm -rf /var/lib/postgresql/data/* &&
      pg_basebackup -h timescale-primary -D /var/lib/postgresql/data -U ${PGUSER:-replicator} -v -P -W -X stream -R &&
      echo 'standby_mode = on' >> /var/lib/postgresql/data/recovery.conf &&
      echo 'primary_conninfo = \"host=timescale-primary port=5432 user=${PGUSER:-replicator} password=${PGPASSWORD:-replica_secure_2024}\"' >> /var/lib/postgresql/data/recovery.conf &&
      echo 'recovery_target_timeline = \"latest\"' >> /var/lib/postgresql/data/recovery.conf &&
      chmod 700 /var/lib/postgresql/data &&
      postgres
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_REPLICA_USER:-replicator}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  timescale-replica-2:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: dragonscope-timescale-replica-2
    hostname: timescale-replica-2
    depends_on:
      timescale-primary:
        condition: service_healthy
    environment:
      PGUSER: ${POSTGRES_REPLICA_USER:-replicator}
      PGPASSWORD: ${POSTGRES_REPLICA_PASSWORD:?POSTGRES_REPLICA_PASSWORD must be set}
    volumes:
      - timescale-replica-2-data:/var/lib/postgresql/data
    networks:
      - dragonscope-backend
    ports:
      - "5434:5432"
    command: >
      bash -c "
      rm -rf /var/lib/postgresql/data/* &&
      pg_basebackup -h timescale-primary -D /var/lib/postgresql/data -U ${PGUSER:-replicator} -v -P -W -X stream -R &&
      echo 'standby_mode = on' >> /var/lib/postgresql/data/recovery.conf &&
      echo 'primary_conninfo = \"host=timescale-primary port=5432 user=${PGUSER:-replicator} password=${PGPASSWORD:-replica_secure_2024}\"' >> /var/lib/postgresql/data/recovery.conf &&
      echo 'recovery_target_timeline = \"latest\"' >> /var/lib/postgresql/data/recovery.conf &&
      chmod 700 /var/lib/postgresql/data &&
      postgres
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_REPLICA_USER:-replicator}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  # ===========================================================================
  # TIMESCALEDB BACKUP SERVICE
  # ===========================================================================
  timescale-backup:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: dragonscope-timescale-backup
    depends_on:
      - timescale-primary
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGUSER: ${POSTGRES_USER:-dragonscope}
      PGHOST: timescale-primary
      PGDATABASE: dragonscope_data
    volumes:
      - ./backups/timescale:/backups
    networks:
      - dragonscope-backend
    command: >
      bash -c "
      while true; do
        echo 'Starting backup at $$(date)' &&
        pg_dump -Fc dragonscope_data > /backups/dragonscope_backup_$$(date +%Y%m%d_%H%M%S).dump &&
        find /backups -name '*.dump' -mtime +7 -delete &&
        echo 'Backup completed at $$(date)' &&
        sleep 86400
      done
      "
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ===========================================================================
  # REDIS CLUSTER (6 Nodes: 3 Masters + 3 Slaves)
  # ===========================================================================
  redis-node-1:
    image: redis:7.2-alpine
    container_name: dragonscope-redis-node-1
    hostname: redis-node-1
    volumes:
      - redis-node-1-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - dragonscope-backend
    ports:
      - "6379:6379"
      - "16379:16379"
    command: redis-server /usr/local/etc/redis/redis.conf --port 6379 --cluster-enabled yes --cluster-config-file nodes-6379.conf --cluster-node-timeout 5000 --appendonly yes --appendfsync everysec --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped

  redis-node-2:
    image: redis:7.2-alpine
    container_name: dragonscope-redis-node-2
    hostname: redis-node-2
    volumes:
      - redis-node-2-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - dragonscope-backend
    ports:
      - "6380:6380"
      - "16380:16380"
    command: redis-server /usr/local/etc/redis/redis.conf --port 6380 --cluster-enabled yes --cluster-config-file nodes-6380.conf --cluster-node-timeout 5000 --appendonly yes --appendfsync everysec --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped

  redis-node-3:
    image: redis:7.2-alpine
    container_name: dragonscope-redis-node-3
    hostname: redis-node-3
    volumes:
      - redis-node-3-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - dragonscope-backend
    ports:
      - "6381:6381"
      - "16381:16381"
    command: redis-server /usr/local/etc/redis/redis.conf --port 6381 --cluster-enabled yes --cluster-config-file nodes-6381.conf --cluster-node-timeout 5000 --appendonly yes --appendfsync everysec --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6381", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped

  redis-node-4:
    image: redis:7.2-alpine
    container_name: dragonscope-redis-node-4
    hostname: redis-node-4
    volumes:
      - redis-node-4-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - dragonscope-backend
    ports:
      - "6382:6382"
      - "16382:16382"
    command: redis-server /usr/local/etc/redis/redis.conf --port 6382 --cluster-enabled yes --cluster-config-file nodes-6382.conf --cluster-node-timeout 5000 --appendonly yes --appendfsync everysec --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6382", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped

  redis-node-5:
    image: redis:7.2-alpine
    container_name: dragonscope-redis-node-5
    hostname: redis-node-5
    volumes:
      - redis-node-5-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - dragonscope-backend
    ports:
      - "6383:6383"
      - "16383:16383"
    command: redis-server /usr/local/etc/redis/redis.conf --port 6383 --cluster-enabled yes --cluster-config-file nodes-6383.conf --cluster-node-timeout 5000 --appendonly yes --appendfsync everysec --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6383", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped

  redis-node-6:
    image: redis:7.2-alpine
    container_name: dragonscope-redis-node-6
    hostname: redis-node-6
    volumes:
      - redis-node-6-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - dragonscope-backend
    ports:
      - "6384:6384"
      - "16384:16384"
    command: redis-server /usr/local/etc/redis/redis.conf --port 6384 --cluster-enabled yes --cluster-config-file nodes-6384.conf --cluster-node-timeout 5000 --appendonly yes --appendfsync everysec --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6384", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped

  # Redis Cluster Init
  redis-cluster-init:
    image: redis:7.2-alpine
    container_name: dragonscope-redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    networks:
      - dragonscope-backend
    command: >
      sh -c "
      sleep 10 &&
      redis-cli --cluster create 
        redis-node-1:6379 redis-node-2:6380 redis-node-3:6381 
        redis-node-4:6382 redis-node-5:6383 redis-node-6:6384 
        --cluster-replicas 1 --cluster-yes
      "
    deploy:
      restart_policy:
        condition: none

  # ===========================================================================
  # CLICKHOUSE (Analytics Database)
  # ===========================================================================
  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: dragonscope-clickhouse
    hostname: clickhouse
    environment:
      CLICKHOUSE_DB: dragonscope_analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./config/clickhouse/config.xml:/etc/clickhouse-server/config.d/config.xml:ro
      - ./config/clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
    networks:
      - dragonscope-backend
      - dragonscope-dmz
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"  # Native
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    restart: unless-stopped

  # ===========================================================================
  # MINIO CLUSTER (S3-Compatible Object Storage)
  # ===========================================================================
  minio-1:
    image: minio/minio:RELEASE.2024-01-13T07-53-03Z
    container_name: dragonscope-minio-1
    hostname: minio-1
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_DISTRIBUTED_MODE_ENABLED: "on"
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio-data-1:/data1
      - minio-data-2:/data2
    networks:
      - dragonscope-backend
      - dragonscope-dmz
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server --console-address ':9001' http://minio-{1...4}/data{1...2}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  minio-2:
    image: minio/minio:RELEASE.2024-01-13T07-53-03Z
    container_name: dragonscope-minio-2
    hostname: minio-2
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_DISTRIBUTED_MODE_ENABLED: "on"
    volumes:
      - minio-data-3:/data1
      - minio-data-4:/data2
    networks:
      - dragonscope-backend
    command: server --console-address ':9001' http://minio-{1...4}/data{1...2}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  minio-3:
    image: minio/minio:RELEASE.2024-01-13T07-53-03Z
    container_name: dragonscope-minio-3
    hostname: minio-3
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_DISTRIBUTED_MODE_ENABLED: "on"
    volumes:
      - minio-data-1:/data1
      - minio-data-2:/data2
    networks:
      - dragonscope-backend
    command: server --console-address ':9001' http://minio-{1...4}/data{1...2}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  minio-4:
    image: minio/minio:RELEASE.2024-01-13T07-53-03Z
    container_name: dragonscope-minio-4
    hostname: minio-4
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_DISTRIBUTED_MODE_ENABLED: "on"
    volumes:
      - minio-data-3:/data1
      - minio-data-4:/data2
    networks:
      - dragonscope-backend
    command: server --console-address ':9001' http://minio-{1...4}/data{1...2}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  # ===========================================================================
  # PROMETHEUS (Metrics Collection)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: dragonscope-prometheus
    hostname: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--storage.tsdb.min-block-duration=2h'
      - '--storage.tsdb.max-block-duration=2h'
      - '--query.max-samples=50000000'
      - '--query.timeout=2m'
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
      - ./monitoring/recording-rules.yml:/etc/prometheus/recording-rules.yml:ro
    networks:
      - dragonscope-monitoring
      - dragonscope-backend
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  # ===========================================================================
  # ALERTMANAGER
  # ===========================================================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: dragonscope-alertmanager
    hostname: alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    volumes:
      - alertmanager-data:/alertmanager
      - ./config/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
    networks:
      - dragonscope-monitoring
    ports:
      - "9093:9093"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped

  # ===========================================================================
  # GRAFANA (Visualization)
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: dragonscope-grafana
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource,marcusolsson-json-datasource,grafana-piechart-panel,grafana-worldmap-panel
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dragonscope-overview.json
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_HA_PEERS: grafana:9094
      GF_UNIFIED_ALERTING_HA_LISTEN_ADDRESS: 0.0.0.0:9094
      GF_UNIFIED_ALERTING_HA_LABEL: dragonscope
      GF_UNIFIED_ALERTING_HA_ADVERTISE_ADDRESS: grafana:9094
      GF_SNAPSHOTS_EXTERNAL_ENABLED: "false"
      GF_METRICS_ENABLED: "true"
      GF_METRICS_INTERVAL_SECONDS: 10
      GF_TRACING_ENABLED: "true"
      GF_TRACING_JAEGER_ADDRESS: jaeger:6831
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/var/lib/grafana/dashboards:ro
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - dragonscope-monitoring
      - dragonscope-backend
      - dragonscope-dmz
    ports:
      - "3000:3000"
      - "9094:9094"
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ===========================================================================
  # LOKI (Log Aggregation)
  # ===========================================================================
  loki:
    image: grafana/loki:2.9.0
    container_name: dragonscope-loki
    hostname: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
    networks:
      - dragonscope-monitoring
      - dragonscope-backend
    ports:
      - "3100:3100"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  # ===========================================================================
  # PROMTAIL (Log Shipping Agent)
  # ===========================================================================
  promtail:
    image: grafana/promtail:2.9.0
    container_name: dragonscope-promtail
    hostname: promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./config/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - dragonscope-monitoring
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  # ===========================================================================
  # JAEGER (Distributed Tracing)
  # ===========================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: dragonscope-jaeger
    hostname: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      JAEGER_DISABLED: "false"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger-data:/badger
    networks:
      - dragonscope-monitoring
      - dragonscope-backend
      - dragonscope-dmz
    ports:
      - "6831:6831/udp"   # UDP agent
      - "6832:6832/udp"   # UDP agent
      - "5778:5778"       # Agent config
      - "16686:16686"     # Query UI
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
      - "14250:14250"     # gRPC collector
      - "14268:14268"     # HTTP collector
      - "14269:14269"     # Admin
      - "9411:9411"       # Zipkin
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped

  # ===========================================================================
  # NODE EXPORTER (System Metrics)
  # ===========================================================================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: dragonscope-node-exporter
    hostname: node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - dragonscope-monitoring
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  # ===========================================================================
  # CADVISOR (Container Metrics)
  # ===========================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: dragonscope-cadvisor
    hostname: cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - dragonscope-monitoring
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  # ===========================================================================
  # REDIS EXPORTER
  # ===========================================================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: dragonscope-redis-exporter
    hostname: redis-exporter
    environment:
      REDIS_ADDR: redis://redis-node-1:6379
      REDIS_USER: default
    networks:
      - dragonscope-monitoring
      - dragonscope-backend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  # ===========================================================================
  # POSTGRES EXPORTER
  # ===========================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: dragonscope-postgres-exporter
    hostname: postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-dragonscope}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@timescale-primary:5432/dragonscope_data?sslmode=disable
    networks:
      - dragonscope-monitoring
      - dragonscope-backend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  # ===========================================================================
  # KAFKA EXPORTER
  # ===========================================================================
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: dragonscope-kafka-exporter
    hostname: kafka-exporter
    command:
      - '--kafka.server=kafka-1:9092'
      - '--kafka.server=kafka-2:9092'
      - '--kafka.server=kafka-3:9092'
      - '--sasl.enabled=false'
      - '--web.listen-address=:9308'
    networks:
      - dragonscope-monitoring
      - dragonscope-backend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped
