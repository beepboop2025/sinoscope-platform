# DragonScope Enterprise - Prometheus Recording Rules
# Pre-aggregated queries for efficient alerting and dashboards

groups:
  # ============================================================================
  # INFRASTRUCTURE RECORDINGS
  # ============================================================================
  - name: infrastructure
    interval: 30s
    rules:
      # CPU Usage Aggregation
      - record: instance:node_cpu_utilisation:rate5m
        expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
      
      # Memory Usage Aggregation
      - record: instance:node_memory_utilisation:ratio
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes
      
      # Disk Usage Aggregation
      - record: instance:node_disk_utilisation:ratio
        expr: 1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})
      
      # Network Traffic
      - record: instance:node_network_receive_bytes:rate5m
        expr: sum by (instance) (irate(node_network_receive_bytes_total[5m]))
      
      - record: instance:node_network_transmit_bytes:rate5m
        expr: sum by (instance) (irate(node_network_transmit_bytes_total[5m]))

  # ============================================================================
  # APPLICATION RECORDINGS
  # ============================================================================
  - name: dragonscope-application
    interval: 15s
    rules:
      # Request Rate
      - record: job:dragonscope_api_requests:rate5m
        expr: sum by (job, status) (rate(http_requests_total{job="dragonscope-api"}[5m]))
      
      # Error Rate
      - record: job:dragonscope_api_error_rate:ratio5m
        expr: |
          sum(rate(http_requests_total{job="dragonscope-api",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="dragonscope-api"}[5m]))
      
      # Latency Percentiles
      - record: job:dragonscope_api_latency:p99
        expr: histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{job="dragonscope-api"}[5m])))
      
      - record: job:dragonscope_api_latency:p95
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job="dragonscope-api"}[5m])))
      
      - record: job:dragonscope_api_latency:p50
        expr: histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket{job="dragonscope-api"}[5m])))
      
      # Availability
      - record: job:dragonscope_api_availability:ratio5m
        expr: |
          sum(rate(http_requests_total{job="dragonscope-api",status!~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="dragonscope-api"}[5m]))

  # ============================================================================
  # DATABASE RECORDINGS
  # ============================================================================
  - name: database
    interval: 30s
    rules:
      # PostgreSQL Connection Utilization
      - record: instance:pg_connection_utilisation:ratio
        expr: |
          pg_stat_activity_count{datname!=""}
          /
          pg_settings_max_connections
      
      # PostgreSQL Transaction Rate
      - record: instance:pg_transactions:rate5m
        expr: |
          sum by (instance) (
            rate(pg_stat_database_xact_commit[5m]) +
            rate(pg_stat_database_xact_rollback[5m])
          )
      
      # PostgreSQL Cache Hit Ratio
      - record: instance:pg_cache_hit_ratio:ratio
        expr: |
          sum by (instance) (pg_stat_database_blks_hit)
          /
          sum by (instance) (pg_stat_database_blks_hit + pg_stat_database_blks_read)
      
      # Redis Memory Utilization
      - record: instance:redis_memory_utilisation:ratio
        expr: redis_memory_used_bytes / redis_memory_max_bytes
      
      # Redis Hit Rate
      - record: instance:redis_keyspace_hit_rate:ratio
        expr: |
          rate(redis_keyspace_hits_total[5m])
          /
          (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))

  # ============================================================================
  # KAFKA RECORDINGS
  # ============================================================================
  - name: kafka
    interval: 30s
    rules:
      # Message Rate
      - record: kafka_topic:messages_in:rate5m
        expr: sum by (topic) (rate(kafka_topic_partition_in_messages[5m]))
      
      # Byte Rate
      - record: kafka_topic:bytes_in:rate5m
        expr: sum by (topic) (rate(kafka_topic_partition_in_bytes[5m]))
      
      # Consumer Lag by Consumer Group
      - record: kafka_consumer_group:lag:max
        expr: max by (group, topic) (kafka_consumer_group_lag)
      
      # Broker Message Rate
      - record: kafka_broker:messages_in:rate5m
        expr: sum by (instance) (rate(kafka_server_brokertopicmetrics_messagesin_total[5m]))

  # ============================================================================
  # KUBERNETES RECORDINGS
  # ============================================================================
  - name: kubernetes
    interval: 30s
    rules:
      # Pod CPU Utilization
      - record: namespace_pod:container_cpu_usage:sum
        expr: sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{container!=""}[5m]))
      
      # Pod Memory Utilization
      - record: namespace_pod:container_memory_usage:sum
        expr: sum by (namespace, pod) (container_memory_working_set_bytes{container!=""})
      
      # Container Restart Rate
      - record: namespace_pod_container:restarts:rate5m
        expr: rate(kube_pod_container_status_restarts_total[5m])
      
      # Pod Availability
      - record: namespace_deployment:pod_availability:ratio
        expr: |
          kube_deployment_status_replicas_available
          /
          kube_deployment_spec_replicas
      
      # Resource Quota Utilization
      - record: namespace_resource:quota_utilization:ratio
        expr: |
          kube_resourcequota{resource="requests.cpu",type="used"}
          /
          kube_resourcequota{resource="requests.cpu",type="hard"}

  # ============================================================================
  # SLA/SLO RECORDINGS
  # ============================================================================
  - name: slo
    interval: 60s
    rules:
      # API Availability SLO (99.9%)
      - record: slo:dragonscope_api_availability:ratio
        expr: |
          (
            sum(rate(http_requests_total{job="dragonscope-api",status!~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="dragonscope-api"}[5m]))
          ) >= 0.999
      
      # API Latency SLO (p95 < 500ms)
      - record: slo:dragonscope_api_latency:p95
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="dragonscope-api"}[5m]))
          ) <= 0.5
      
      # Error Budget
      - record: slo:error_budget:remaining
        expr: |
          (
            1 - 0.001  # 99.9% availability
            -
            (
              sum(rate(http_requests_total{job="dragonscope-api",status=~"5.."}[30d]))
              /
              sum(rate(http_requests_total{job="dragonscope-api"}[30d]))
            )
          ) * 100
