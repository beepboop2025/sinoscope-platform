<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06d6e0"/>
      <stop offset="50%" stop-color="#00f5d4"/>
      <stop offset="100%" stop-color="#06d6e0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#06d6e0" stroke-width="4" opacity="0.9"/>
  <!-- Glow effect behind chart -->
  <path d="M100 340 L180 280 L230 310 L290 200 L340 240 L400 160" stroke="#06d6e0" stroke-width="16" fill="none" opacity="0.15" filter="url(#blur)"/>
  <!-- Chart line -->
  <path d="M100 340 L180 280 L230 310 L290 200 L340 240 L400 160" stroke="url(#glow)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chart dots -->
  <circle cx="100" cy="340" r="6" fill="#06d6e0"/>
  <circle cx="180" cy="280" r="6" fill="#06d6e0"/>
  <circle cx="230" cy="310" r="6" fill="#06d6e0"/>
  <circle cx="290" cy="200" r="6" fill="#06d6e0"/>
  <circle cx="340" cy="240" r="6" fill="#06d6e0"/>
  <circle cx="400" cy="160" r="6" fill="#06d6e0"/>
  <!-- Dragon eye -->
  <ellipse cx="400" cy="160" rx="28" ry="18" fill="none" stroke="#06d6e0" stroke-width="3" opacity="0.8"/>
  <ellipse cx="400" cy="160" rx="10" ry="16" fill="#06d6e0" opacity="0.9"/>
  <ellipse cx="400" cy="160" rx="4" ry="12" fill="#050810"/>
  <!-- Grid lines -->
  <line x1="100" y1="370" x2="420" y2="370" stroke="#06d6e0" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="310" x2="420" y2="310" stroke="#06d6e0" stroke-width="1" opacity="0.1"/>
  <line x1="100" y1="250" x2="420" y2="250" stroke="#06d6e0" stroke-width="1" opacity="0.1"/>
  <line x1="100" y1="190" x2="420" y2="190" stroke="#06d6e0" stroke-width="1" opacity="0.1"/>
</svg>
